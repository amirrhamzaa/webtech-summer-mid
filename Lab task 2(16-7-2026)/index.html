<!DOCTYPE html>
<html>

<head>
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <div class="container">
        <fieldset>
            <legend>Student Registration</legend>
            <form onsubmit="return validateForm()">
                <table class="table">
                    <tr>
                        <td>Enter Your First Name:<span class="requirred">*</span> </td>
                        <td><input type="text" id="fName" />
                            <p id="fnameError" style="font-size: 10px; color: red;"></p>
                        </td>
                    </tr>
                    <tr>
                        <td>Enter Your Last Name:<span class="requirred">*</span> </td>
                        <td><input type="text" id="lName" />
                            <p id="lnameError" style="font-size: 10px; color: red;"></p>
                        </td>
                    </tr>
                    <tr>
                        <td>Your Student ID: <span class="requirred">*</span> </td>

                        <td><input type="text" id="studentId" />
                            <p id="studentIdError" style="font-size: 10px; color: red;"></p>

                        </td>
                    </tr>
                    <tr>
                        <td>Your Email: <span class="requirred">*</span> </td>
                        <td><input type="email" id="email" />
                            <p id="emailError" style="font-size: 10px; color: red;"></p>
                        </td>
                    </tr>
                    <tr>
                        <td>Total Credit Completed : <span class="requirred">*</span> </td>
                        <td><input type="number" id="totalCreditCompleted" />
                            <p id="totalCreditCompletedError" style="font-size: 10px; color: red;"></p>
                        </td>
                    </tr>
                    <tr>
                        <td>Select Your Department : <span class="requirred">*</span> </td>
                        <td>
                            <select id="department">
                                <option value="">Select Department</option>
                                <option value="EEE">EEE</option>
                                <option value="CSE">CSE</option>
                                <option value="English">English</option>
                                <option value="civil">civil</option>
                                <option value="BBA">BBA</option>
                            </select>
                            <p id="departmentError" style="font-size: 10px; color: red;"></p>
                        </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="Submit" value="Submit" class="btn" /></td>
                    </tr>
                </table>
            </form>
        </fieldset>
    </div>

    <h4 class="registered">Registered Students Details:</h4>
    <table border="3" id="registrationTable">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Student ID</th>
            <th>Email</th>
            <th>Total Credit Completed</th>
            <th>Department</th>
        </tr>
    </table>
</body>

</html>
