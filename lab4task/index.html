<!DOCTYPE html>

<head>
    <title>Student Information</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
      <fieldset class="maindiv">
     
            <legend> Student Information</legend>
        <div>
            <table>
                <tr>
                    <td>
                        <label for="name">Full Name(Text)</label>
                        <input type="text" id="name" placeholder="Enter your full name">
                    </td>
                    <td>
                        <label for="email">Email Address </label>
                        <input type="email" id="email" placeholder="your.email@kexample.com">
                    </td>
                <tr>
                    <td>
                        <label for="password">password</label>
                        <input type="password" id="password" placeholder="Enter secure password">
                    </td>

                    <td>
                        <label for="age">Age</label>
                        <input type="age" id="age" placeholder="Enter your age">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="date">Experiment Date</label>
                        <input type="date" id="date">
                    </td>

                    <td>
                        <label for="phn">Phone Number(Tel)</label>
                        <input type="phn" id="phn" placeholder="+880XXXX XXXXXX">
                    </td>
                </tr>
            </table>
            <div class="btn">
                <button class="submitbtn">SUBMIT</button>
                <button class="clearbtn">CLEAR</button>
            </div>
        </div>
    </fieldset>
</body>

</html>
