<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab3 1st Task</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Welcome to Pental Shop</h1>

    <table>
        <tr class="thead">
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        <tr class="">
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock</td>
        </tr>
        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>

    <div class="contact-box">
        <h2>Contact Information</h2>
        <div class="form">
            <label for="name">Name</label>
            <input type="text" id="name">
        </div>
        <div class="form">
            <label for="email">Email</label>
            <input type="email" id="email">
        </div>
        <div class="form">
            <label for="message">Message</label>
            <textarea id="message"></textarea>
        </div>
        <div class="submit-btn">
            <button>Submit</button>
        </div>
    </div>
</body>

</html>
